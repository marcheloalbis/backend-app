<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>User Report</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      text-align: left;
      padding: 8px;
    }
    tr:nth-child(even){background-color: #f2f2f2}
    th {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>
  <h1>User Report</h1>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
      </tr>
    </thead>
    <tbody>
      <% for(var i=0; i<users.length; i++) { %>
        <tr>
          <td><%= users[i].name %></td>
          <td><%= users[i].email %></td>
          <td><%= users[i].phone %></td>
        </tr>
      <% } %>
    </tbody>
  </table>
</body>
</html>
